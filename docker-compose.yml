networks:
  fss-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: fss-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - fss-network

  redis:
    image: redis:7-alpine
    container_name: fss-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - fss-network

  minio:
    image: minio/minio:latest
    container_name: fss-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - fss-network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: deps
    container_name: fss-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_BUCKET: ${MINIO_BUCKET}
    command: npx nest start --watch
    depends_on:
      - postgres
      - redis
    networks:
      - fss-network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: fss-web
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
    depends_on:
      - api
    networks:
      - fss-network

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: fss-worker
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      # COLMAP이 Docker 안에서 디스플레이 없이 실행되도록
      QT_QPA_PLATFORM: offscreen
      DISPLAY: ""
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./worker/src:/app/src   # 소스 변경 시 --build 없이 restart 만으로 반영
    depends_on:
      - redis
      - minio
      - postgres
    networks:
      - fss-network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: fss-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
      - web
    networks:
      - fss-network